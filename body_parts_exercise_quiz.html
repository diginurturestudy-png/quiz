<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Body Parts Exercise Quiz</title>
</head>
<body>
    <h1>Body Parts Exercise Quiz</h1>
    <form>
        <label for="question1">1. What is the largest organ in the human body?</label><br>
        <input type="radio" name="question1" value="A"> A) Heart<br>
        <input type="radio" name="question1" value="B"> B) Skin<br>
        <input type="radio" name="question1" value="C"> C) Liver<br>
        <input type="radio" name="question1" value="D"> D) Lung<br><br>
        
        <label for="question2">2. How many bones are in the adult human body?</label><br>
        <input type="radio" name="question2" value="A"> A) 206<br>
        <input type="radio" name="question2" value="B"> B) 205<br>
        <input type="radio" name="question2" value="C"> C) 201<br>
        <input type="radio" name="question2" value="D"> D) 208<br><br>
        
        <label for="question3">3. What is the function of the skeleton?</label><br>
        <input type="radio" name="question3" value="A"> A) To move the body<br>
        <input type="radio" name="question3" value="B"> B) To protect internal organs<br>
        <input type="radio" name="question3" value="C"> C) To produce blood cells<br>
        <input type="radio" name="question3" value="D"> D) All of the above<br><br>
        
        <input type="submit" value="Submit">
    </form>
</body>
</html>
